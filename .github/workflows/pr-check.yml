name: PR check (lint + unit)

# Slim PR-only check so external contributors get green/red signal on
# their PRs. The full pipeline (lint + unit + integration with real
# pgvector + build) lives on GitLab and runs on master merges.
# See ~/.claude/rules/gitlab-ci-policy.md or MNEMOS memory
# "gitlab ci policy" for the fleet pattern.

on:
  pull_request:
    branches: [master, main, v3.5-dev]

jobs:
  lint-and-unit:
    name: ruff + pytest unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Lint (ruff)
        run: .venv/bin/ruff check .

      - name: Lint env discipline
        run: |
          # Runtime environment reads must route through mnemos/core/config.py.
          # Allowed exceptions:
          #   - mnemos/installer/* runs before package configuration exists.
          #   - tests/* may set process environment for test isolation (outside mnemos/).
          if grep -RInE '(^|[^[:alnum:]_])_?os\.(environ|getenv)' mnemos --exclude-dir=installer | grep -v '^mnemos/core/config.py:'; then
            echo "Forbidden os.environ/os.getenv usage outside mnemos/core/config.py or mnemos/installer/."
            exit 1
          fi

      - name: Lint imports
        run: .venv/bin/lint-imports --config pyproject.toml

      - name: Unit tests
        run: .venv/bin/pytest tests/ --tb=short --ignore=tests/test_live_e2e.py -q
