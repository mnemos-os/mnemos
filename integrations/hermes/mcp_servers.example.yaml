# Merge this into ~/.hermes/config.yaml under the mcp_servers key.
# Replace <your-mnemos-host> with your MNEMOS deployment's hostname or IP.

mcp_servers:
  mnemos:
    command: /path/to/mnemos/venv/bin/mnemos
    args: ["serve", "mcp-stdio"]
    env:
      MNEMOS_BASE: "http://<your-mnemos-host>:5002"
      # MNEMOS_API_KEY: "<optional-bearer-key-for-team-enterprise-profiles>"
